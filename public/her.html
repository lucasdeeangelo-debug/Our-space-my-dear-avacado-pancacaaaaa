<!DOCTYPE html>
<html>
<head>
  <title>Her Space</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Write what you can't say</h2>

<textarea id="note"></textarea>
<button onclick="save()">Save</button>

<h3>Playlist</h3>
<audio controls src="drive.mp3"></audio>
<audio controls src="giveup.mp3"></audio>

<script>
function save(){
  fetch("/save", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      user:"her",
      content: document.getElementById("note").value
    })
  });
}
</script>

</body>
</html>
