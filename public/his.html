<<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🖤 For you. Just… not yet.</h1>

<p id="affirm"></p>

<div class="box">
<textarea id="note" placeholder="write what you can't say..."></textarea>
<button onclick="save()">Seal it</button>
<p id="status"></p>
</div>

<p id="count"></p>
<p id="timer"></p>
<p id="missed"></p>

<div id="notes"></div>

<h2>🎧 Playlist</h2>

<select id="playlist" onchange="changeSong()">
  <option value="drive.mp3">Simp on me</option>
  <option value="giveup.mp3">Vent</option>
  <option value="stargazing.mp3">Safe</option>
  <option value="ultra.mp3">Deep</option>
</select>

<audio id="player" controls></audio>

<br><br>

<input type="file" accept="audio/*" onchange="addSong(event)">

<script>

// AFFIRMATIONS
const lines = [
"I love you.",
"I'm trying.",
"I'm sorry for when I disappear.",
"You matter more than I say.",
"I hope you stay."
];
document.getElementById("affirm").innerText =
lines[Math.floor(Math.random()*lines.length)];


// SAVE
function save(){
fetch("/save",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:"her",
content:document.getElementById("note").value
})
}).then(()=>{
document.getElementById("status").innerText="🖤 sealed.";
load();
});
}


// LOAD NOTES
function load(){
fetch("/notes")
.then(r=>r.json())
.then(d=>{
let html="", count=0;

d.data.her.forEach(n=>{
count++;
html+=`<div class="note ${d.locked?'blur':''}">
${n.date}<br>${n.content}
</div>`;
});

document.getElementById("notes").innerHTML=html;
document.getElementById("count").innerText="🖤 messages: "+count;

// MISSED WRITING
let last = d.data.her.slice(-1)[0];
if(last){
let diff = (new Date() - new Date(last.date))/(1000*60*60*24);
if(diff > 1){
document.getElementById("missed").innerText =
"you haven’t written in a while.";
}
}
});
}


// COUNTDOWN
const reveal = new Date("2026-06-09T00:00:00");

setInterval(()=>{
let diff = reveal - new Date();

let d = Math.floor(diff/(1000*60*60*24));
let h = Math.floor((diff/(1000*60*60))%24);

document.getElementById("timer").innerText =
`⏳ ${d}d ${h}h`;
},1000);


// PLAYLIST
function changeSong(){
let song = document.getElementById("playlist").value;
let player = document.getElementById("player");
player.src = song;
player.play();
}

// ADD CUSTOM SONG
function addSong(e){
let file = e.target.files[0];
let url = URL.createObjectURL(file);

let select = document.getElementById("playlist");
let option = document.createElement("option");

option.text = file.name;
option.value = url;

select.add(option);
}


// INIT
load();
</script>

</body>
</html>
